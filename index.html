<!DOCTYPE html>
<html lang="be">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Генеалагічны пошук</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="header-ornament">🌿</div>
      <h1>Генеалагічны пошук</h1>
      <p class="subtitle">Пошук па рэвізіях, метрычных кнігах і спісах прыхажан</p>
    </div>
  </header>

  <main>
    <section class="search-section">
      <div class="search-box">
        <label for="person-id">Нумар асобы</label>
        <div class="input-row">
          <input type="number" id="person-id" placeholder="напр. 1234" min="1" />
          <button id="search-btn">Пошук</button>
        </div>
        <p class="search-hint">Увядзіце унікальны нумар асобы для пошуку ва ўсіх крыніцах.</p>
        <p class="cache-status" id="cache-status"></p>
      </div>
    </section>

    <section id="results" class="results-section hidden">
      <div class="results-header">
        <h2>Запісы для асобы <span id="results-id"></span><span id="results-name" class="results-name"></span></h2>
        <div id="results-summary" class="results-summary"></div>
      </div>
      <div id="results-body"></div>
    </section>

    <section id="error-section" class="error-section hidden">
      <div class="error-box">
        <span class="error-icon">⚠</span>
        <p id="error-message"></p>
      </div>
    </section>

    <section id="loading-section" class="loading-section hidden">
      <div class="loading-inner">
        <div class="spinner"></div>
        <p id="loading-message">Загрузка запісаў…</p>
      </div>
    </section>
  </main>

  <footer>
    <p>Дадзеныя з Google Sheets — запісы на польскай, рускай і беларускай мовах</p>
  </footer>

  <script src="config.js?v=2"></script>
  <script src="app.js?v=2"></script>
  <button id="scroll-top" title="Наверх" aria-label="Наверх">↑</button>
</body>
</html>
